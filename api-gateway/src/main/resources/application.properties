spring.application.name=api-gateway

server.port=9191

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

jwt.secret=super-secret-key-super-secret-key

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=users-service
spring.cloud.gateway.routes[0].uri=lb://users-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/users/(?<remaining>.*), /api/$\{remaining}

spring.cloud.gateway.routes[1].id=data-service
spring.cloud.gateway.routes[1].uri=lb://data-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/data/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/data/(?<remaining>.*), /api/$\{remaining}

spring.cloud.gateway.routes[2].id=auth-service
spring.cloud.gateway.routes[2].uri=lb://auth-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/auth/(?<remaining>.*), /api/$\{remaining}

resilience4j.retry.configs.default.wait-duration=2s
resilience4j.retry.configs.default.max-attempts=3

resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=5000ms
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.timelimiter.configs.default.timeout-duration=3s

management.endpoints.web.exposure.include=prometheus

management.endpoint.health.show-details=always

management.endpoint.circuitbreakers.enabled=true